services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: economic
      POSTGRES_PASSWORD: economic
      POSTGRES_DB: economic_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U economic -d economic_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      PORT: 8787
      DATABASE_URL: postgresql://economic:economic@postgres:5432/economic_data?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173
      ENABLE_SCHEDULER: "true"
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8787
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
